<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <title>두술 생일 알림</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 30px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .header .emoji {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .status {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .status.loading {
            color: #666;
        }

        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .birthday-list {
            margin-top: 20px;
        }

        .birthday-card {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .birthday-card .name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .birthday-card .message {
            font-size: 16px;
            color: #555;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .info {
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 10px;
            font-size: 14px;
            color: #1565c0;
            text-align: center;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-birthday {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 16px;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="emoji">🎂</div>
            <h1>두술 생일 알림</h1>
        </div>

        <div id="status" class="status loading">
            알림 권한을 확인하는 중...
        </div>

        <!-- 탭 메뉴 -->
        <div style="display: flex; gap: 5px; margin-bottom: 20px;">
            <button class="tab-btn active" data-tab="birthday" style="flex: 1; padding: 12px; border: none; background: #667eea; color: white; border-radius: 8px; cursor: pointer; font-weight: bold;">
                🎂 생일
            </button>
            <button class="tab-btn" data-tab="nonpayment" style="flex: 1; padding: 12px; border: none; background: #ddd; color: #666; border-radius: 8px; cursor: pointer; font-weight: bold;">
                💰 회비
            </button>
            <button class="tab-btn" data-tab="exclude" style="flex: 1; padding: 12px; border: none; background: #ddd; color: #666; border-radius: 8px; cursor: pointer; font-weight: bold;">
                ⚠️ 방출
            </button>
        </div>

        <!-- 생일 탭 -->
        <div id="birthdayTab" class="tab-content">
            <button id="checkBtn" class="btn" disabled>생일 확인하기</button>
            <div id="birthdayList" class="birthday-list"></div>
        </div>

        <!-- 회비 미납 탭 -->
        <div id="nonpaymentTab" class="tab-content" style="display: none;">
            <button id="checkNonpaymentBtn" class="btn">회비 미납자 확인</button>
            <div id="nonpaymentList" class="birthday-list"></div>
        </div>

        <!-- 방출 예정 탭 -->
        <div id="excludeTab" class="tab-content" style="display: none;">
            <button id="checkExcludeBtn" class="btn">방출 예정자 확인</button>
            <div id="excludeList" class="birthday-list"></div>
        </div>

        <!-- 알림 설정 -->
        <div style="margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 10px;">
            <h3 style="margin-bottom: 15px; font-size: 18px; color: #333;">⏰ 알림 시간 설정</h3>
            
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
                <input type="number" id="hourInput" min="0" max="23" value="9" 
                       style="width: 60px; padding: 10px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; text-align: center;">
                <span style="font-size: 18px; font-weight: bold;">:</span>
                <input type="number" id="minuteInput" min="0" max="59" value="0" 
                       style="width: 60px; padding: 10px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; text-align: center;">
                <button id="setTimeBtn" class="btn" style="width: auto; padding: 10px 20px; margin: 0;">설정</button>
            </div>
            
            <div style="font-size: 14px; color: #666; margin-bottom: 10px;">
                현재 설정: <span id="currentTime" style="font-weight: bold; color: #667eea;">09:00</span>
            </div>
            
            <div style="display: flex; gap: 5px;">
                <button id="testBirthdayBtn" class="btn" style="flex: 1; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); font-size: 14px; padding: 10px;">
                    🎂 생일
                </button>
                <button id="testNonpaymentBtn" class="btn" style="flex: 1; background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%); font-size: 14px; padding: 10px;">
                    💰 회비
                </button>
                <button id="testExcludeBtn" class="btn" style="flex: 1; background: linear-gradient(135deg, #ff7675 0%, #d63031 100%); font-size: 14px; padding: 10px;">
                    ⚠️ 방출
                </button>
            </div>
        </div>

        <div class="info">
            💡 자동 알림 일정<br>
            🎂 생일: 매일 설정한 시간<br>
            💰 회비: 매월 1, 5, 10일 오전 9시<br>
            ⚠️ 방출: 매월 1, 10, 20, 말일 오전 9시
        </div>

        <div class="footer">
            두리술쩍 멋쟁이 운영진 © 2026
        </div>
    </div>

    <script>
        // 백엔드 서버 주소 자동 감지
        const API_URL = window.location.origin + '/api/birthdays';
        const SUBSCRIBE_URL = window.location.origin + '/api/subscribe';
        const VAPID_URL = window.location.origin + '/api/vapid-public-key';
        
        console.log('API URL:', API_URL);
        
        let notificationPermission = false;
        let swRegistration = null;

        // 서비스 워커 등록
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('Service Worker 등록 성공:', registration);
                    swRegistration = registration;
                    // 푸시 알림 구독
                    subscribeToPushNotifications();
                })
                .catch(error => {
                    console.log('Service Worker 등록 실패:', error);
                });
        }

        // Base64 URL-safe 디코딩
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding)
                .replace(/\-/g, '+')
                .replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        // 푸시 알림 구독
        async function subscribeToPushNotifications() {
            if (!swRegistration) {
                console.log('Service Worker가 아직 등록되지 않았습니다.');
                return;
            }

            try {
                // VAPID 공개 키 가져오기
                const response = await fetch(VAPID_URL);
                const data = await response.json();
                const publicKey = data.publicKey;

                if (!publicKey) {
                    console.log('VAPID 공개 키가 설정되지 않았습니다.');
                    return;
                }

                // 기존 구독 확인
                let subscription = await swRegistration.pushManager.getSubscription();

                if (!subscription) {
                    // 새 구독 생성
                    subscription = await swRegistration.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: urlBase64ToUint8Array(publicKey)
                    });

                    console.log('푸시 알림 구독 성공:', subscription);
                }

                // 서버에 구독 정보 전송
                await fetch(SUBSCRIBE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(subscription)
                });

                console.log('서버에 구독 정보 전송 완료');
            } catch (error) {
                console.error('푸시 알림 구독 실패:', error);
            }
        }

        // 알림 권한 요청
        async function requestNotificationPermission() {
            if (!('Notification' in window)) {
                updateStatus('이 브라우저는 알림을 지원하지 않습니다.', 'error');
                return false;
            }

            if (Notification.permission === 'granted') {
                updateStatus('알림 권한이 허용되었습니다. ✅', 'success');
                return true;
            }

            if (Notification.permission !== 'denied') {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    updateStatus('알림 권한이 허용되었습니다. ✅', 'success');
                    return true;
                }
            }

            updateStatus('알림 권한이 거부되었습니다. 설정에서 허용해주세요.', 'error');
            return false;
        }

        // 상태 메시지 업데이트
        function updateStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        // 구글 시트 데이터 가져오기
        async function fetchBirthdayData() {
            try {
                updateStatus('생일 데이터를 확인하는 중...', 'loading');
                
                // 백엔드 서버에서 데이터 가져오기
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error('서버에 연결할 수 없습니다. 서버가 실행 중인지 확인하세요.');
                }
                
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || '데이터를 가져올 수 없습니다.');
                }
                
                return data.birthdays;
                
            } catch (error) {
                console.error('Error:', error);
                updateStatus('❌ ' + error.message, 'error');
                return null;
            }
        }

        // 생일 알림 표시
        function showBirthdayNotification(names) {
            if (names.length === 0) {
                return;
            }

            const message = names.map(name => `오늘은 ${name}님의 생일입니다! 🎂🎊`).join('\n');
            
            // 브라우저 알림
            if (Notification.permission === 'granted') {
                new Notification('🎉 오늘의 생일자 🎉', {
                    body: message,
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🎂</text></svg>',
                    badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🎂</text></svg>',
                    vibrate: [200, 100, 200]
                });
            }
        }

        // 생일 카드 표시
        function displayBirthdayCards(names) {
            const listEl = document.getElementById('birthdayList');
            listEl.innerHTML = '';
            
            if (names.length === 0) {
                listEl.innerHTML = '<div class="no-birthday">🎈 오늘은 생일인 분이 없습니다.</div>';
                updateStatus('생일 확인 완료!', 'success');
                return;
            }
            
            names.forEach(name => {
                const card = document.createElement('div');
                card.className = 'birthday-card';
                card.innerHTML = `
                    <div class="name">🎉 ${name}님</div>
                    <div class="message">오늘은 생일입니다! 🎂🎊</div>
                `;
                listEl.appendChild(card);
            });
            
            updateStatus(`🎉 오늘의 생일자: ${names.length}명`, 'success');
            showBirthdayNotification(names);
        }

        // 탭 전환
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // 모든 탭 비활성화
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.style.background = '#ddd';
                    b.style.color = '#666';
                    b.classList.remove('active');
                });
                document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
                
                // 선택한 탭 활성화
                btn.style.background = '#667eea';
                btn.style.color = 'white';
                btn.classList.add('active');
                
                const tab = btn.dataset.tab;
                document.getElementById(tab + 'Tab').style.display = 'block';
            });
        });

        // 생일 확인 버튼
        document.getElementById('checkBtn').addEventListener('click', async () => {
            const btn = document.getElementById('checkBtn');
            btn.disabled = true;
            
            const birthdayPeople = await fetchBirthdayData();
            
            if (birthdayPeople !== null) {
                displayBirthdayCards(birthdayPeople);
            }
            
            btn.disabled = false;
        });

        // 회비 미납자 확인 버튼
        document.getElementById('checkNonpaymentBtn').addEventListener('click', async () => {
            const btn = document.getElementById('checkNonpaymentBtn');
            btn.disabled = true;
            btn.textContent = '확인 중...';
            
            try {
                const response = await fetch(window.location.origin + '/api/nonpayment');
                const result = await response.json();
                
                const listEl = document.getElementById('nonpaymentList');
                listEl.innerHTML = '';
                
                if (result.success && result.data) {
                    const data = result.data;
                    
                    if (data.previous_names && data.previous_names.length > 0) {
                        const card = document.createElement('div');
                        card.className = 'birthday-card';
                        card.style.background = 'linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%)';
                        card.innerHTML = `
                            <div class="name">💰 ${data.previous_month} 회비 미납</div>
                            <div class="message">${data.previous_names.join(', ')}</div>
                        `;
                        listEl.appendChild(card);
                    }
                    
                    if (data.current_names && data.current_names.length > 0) {
                        const card = document.createElement('div');
                        card.className = 'birthday-card';
                        card.style.background = 'linear-gradient(135deg, #ff7675 0%, #d63031 100%)';
                        card.innerHTML = `
                            <div class="name">💰 ${data.current_month} 회비 미납</div>
                            <div class="message">${data.current_names.join(', ')}</div>
                        `;
                        listEl.appendChild(card);
                    }
                    
                    if ((!data.previous_names || data.previous_names.length === 0) && 
                        (!data.current_names || data.current_names.length === 0)) {
                        listEl.innerHTML = '<div class="no-birthday">💰 회비 미납자가 없습니다!</div>';
                    }
                    
                    updateStatus('✅ 회비 미납자 확인 완료', 'success');
                } else {
                    updateStatus('❌ 데이터를 가져올 수 없습니다', 'error');
                }
            } catch (error) {
                updateStatus('❌ 오류 발생', 'error');
            }
            
            btn.disabled = false;
            btn.textContent = '회비 미납자 확인';
        });

        // 방출 예정자 확인 버튼
        document.getElementById('checkExcludeBtn').addEventListener('click', async () => {
            const btn = document.getElementById('checkExcludeBtn');
            btn.disabled = true;
            btn.textContent = '확인 중...';
            
            try {
                const response = await fetch(window.location.origin + '/api/exclude-members');
                const result = await response.json();
                
                const listEl = document.getElementById('excludeList');
                listEl.innerHTML = '';
                
                if (result.success && result.data && result.data.names && result.data.names.length > 0) {
                    const card = document.createElement('div');
                    card.className = 'birthday-card';
                    card.style.background = 'linear-gradient(135deg, #ff7675 0%, #d63031 100%)';
                    card.innerHTML = `
                        <div class="name">⚠️ ${result.data.month} 방출 예정</div>
                        <div class="message">${result.data.names.join('<br>')}</div>
                    `;
                    listEl.appendChild(card);
                    updateStatus(`⚠️ 방출 예정자: ${result.data.names.length}명`, 'success');
                } else {
                    listEl.innerHTML = '<div class="no-birthday">✅ 방출 예정자가 없습니다!</div>';
                    updateStatus('✅ 방출 예정자 없음', 'success');
                }
            } catch (error) {
                updateStatus('❌ 오류 발생', 'error');
            }
            
            btn.disabled = false;
            btn.textContent = '방출 예정자 확인';
        });

        // 알림 시간 설정
        document.getElementById('setTimeBtn').addEventListener('click', async () => {
            const hour = parseInt(document.getElementById('hourInput').value);
            const minute = parseInt(document.getElementById('minuteInput').value);
            
            if (hour < 0 || hour > 23 || minute < 0 || minute > 59) {
                alert('올바른 시간을 입력하세요 (시: 0-23, 분: 0-59)');
                return;
            }
            
            try {
                const response = await fetch(window.location.origin + '/api/set-notification-time', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ hour, minute })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('currentTime').textContent = 
                        `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
                    updateStatus('✅ ' + data.message, 'success');
                } else {
                    updateStatus('❌ ' + data.message, 'error');
                }
            } catch (error) {
                updateStatus('❌ 시간 설정 실패', 'error');
            }
        });

        // 생일 테스트 알림
        document.getElementById('testBirthdayBtn').addEventListener('click', async () => {
            await sendTestNotification('birthday', 'testBirthdayBtn', '🎂 생일');
        });

        // 회비 테스트 알림
        document.getElementById('testNonpaymentBtn').addEventListener('click', async () => {
            await sendTestNotification('nonpayment', 'testNonpaymentBtn', '💰 회비');
        });

        // 방출 테스트 알림
        document.getElementById('testExcludeBtn').addEventListener('click', async () => {
            await sendTestNotification('exclude', 'testExcludeBtn', '⚠️ 방출');
        });

        // 테스트 알림 전송 함수
        async function sendTestNotification(type, btnId, label) {
            const btn = document.getElementById(btnId);
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '전송 중...';
            
            try {
                const response = await fetch(window.location.origin + '/api/test-notification', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ type: type })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    updateStatus('✅ ' + data.message, 'success');
                    alert(`${label} 알림이 전송되었습니다!\n알림이 오지 않으면 알림 권한을 확인하세요.`);
                } else {
                    updateStatus('❌ ' + data.message, 'error');
                }
            } catch (error) {
                updateStatus('❌ 테스트 알림 전송 실패', 'error');
            }
            
            btn.disabled = false;
            btn.textContent = originalText;
        }

        // 현재 알림 시간 불러오기
        async function loadNotificationTime() {
            try {
                const response = await fetch(window.location.origin + '/api/get-notification-time');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('hourInput').value = data.hour;
                    document.getElementById('minuteInput').value = data.minute;
                    document.getElementById('currentTime').textContent = 
                        `${String(data.hour).padStart(2, '0')}:${String(data.minute).padStart(2, '0')}`;
                }
            } catch (error) {
                console.error('알림 시간 불러오기 실패:', error);
            }
        }

        // 초기화
        async function init() {
            notificationPermission = await requestNotificationPermission();
            
            const btn = document.getElementById('checkBtn');
            btn.disabled = false;
            
            // 알림 시간 불러오기
            await loadNotificationTime();
            
            // 자동으로 생일 확인
            const birthdayPeople = await fetchBirthdayData();
            if (birthdayPeople !== null) {
                displayBirthdayCards(birthdayPeople);
            }
        }

        // 페이지 로드 시 초기화
        init();
    </script>
</body>
</html>
